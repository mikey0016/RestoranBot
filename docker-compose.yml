version: "3.8"

services:
  test:
    build: .
    image: restoran_bot:alpine
    container_name: restoran_con
    restart: always
    command: "python3 main.py"

  pg:
    image: postgres:alpine
    container_name: orders_db
    restart: always
    environment:
      POSTGRES_PASSWORD: Faxa2000
    ports:
      - "5436:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data:
